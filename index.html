<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Ring MVP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f; color: #f0f0f0;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 2rem;
    }

    h1 { font-size: 1.4rem; font-weight: 600; margin: 2rem 0 0.4rem; text-align: center; }
    .subtitle { font-size: 0.9rem; color: #888; margin-bottom: 2.5rem; text-align: center; }

    .record-btn {
      width: 160px; height: 160px; border-radius: 50%;
      border: 3px solid #333; background: #1a1a1a;
      color: #f0f0f0; font-size: 1rem; font-weight: 600;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0.5rem;
      transition: all 0.2s ease; -webkit-tap-highlight-color: transparent;
    }
    .record-btn:active { transform: scale(0.96); }
    .record-btn.recording {
      border-color: #e74c3c; background: #1a0a0a;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.4); }
      50%      { box-shadow: 0 0 0 16px rgba(231,76,60,0); }
    }
    .btn-icon { font-size: 2rem; }

    .status { margin-top: 1.5rem; font-size: 0.95rem; color: #888; text-align: center; min-height: 1.5rem; }
    .status.active  { color: #e74c3c; }
    .status.saved   { color: #2ecc71; }
    .status.thinking{ color: #9b59b6; }

    .timer { font-size: 2rem; font-weight: 300; color: #e74c3c; margin-top: 0.75rem; display: none; font-variant-numeric: tabular-nums; }
    .timer.visible { display: block; }

    .results { display: none; width: 100%; max-width: 520px; margin-top: 2rem; gap: 1rem; flex-direction: column; }
    .results.visible { display: flex; }

    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; padding: 1.25rem; width: 100%; }
    .card-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.9rem; }
    .card-icon  { font-size: 1.1rem; }
    .card-title { font-size: 0.75rem; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.08em; }

    .summary-list { list-style: none; padding: 0; }
    .summary-list li { font-size: 0.95rem; color: #ddd; line-height: 1.6; padding: 0.3rem 0 0.3rem 1.2rem; position: relative; }
    .summary-list li::before { content: "•"; position: absolute; left: 0; color: #555; }

    .email-subject { font-size: 0.8rem; color: #888; margin-bottom: 0.5rem; }
    .email-body    { font-size: 0.9rem; color: #ddd; line-height: 1.65; white-space: pre-wrap; }

    .task-list { list-style: none; padding: 0; }
    .task-list li { font-size: 0.95rem; color: #ddd; line-height: 1.5; padding: 0.5rem 0 0.5rem 2rem; position: relative; border-bottom: 1px solid #222; }
    .task-list li:last-child { border-bottom: none; }
    .task-list li::before { content: "☐"; position: absolute; left: 0; color: #555; font-size: 1rem; }

    .transcript-text { font-size: 0.85rem; color: #666; line-height: 1.65; }

    .new-btn { margin-top: 1.5rem; margin-bottom: 2rem; background: #1a1a1a; border: 1px solid #333; color: #aaa; padding: 0.75rem 2rem; border-radius: 50px; font-size: 0.9rem; cursor: pointer; display: none; }
    .new-btn.visible { display: block; }
    .new-btn:active { background: #222; }
  </style>
</head>
<body>

  <h1>AI Ring MVP</h1>
  <p class="subtitle">Tap to record · AI does the rest</p>

  <button class="record-btn idle" id="recordBtn" onclick="toggleRecording()">
    <span class="btn-icon" id="btnIcon">🎙️</span>
    <span id="btnLabel">Tap to Record</span>
  </button>

  <p class="status" id="status">Ready</p>
  <p class="timer"  id="timer">0:00</p>

  <div class="results" id="results">
    <div class="card">
      <div class="card-header"><span class="card-icon">📋</span><span class="card-title">Summary</span></div>
      <ul class="summary-list" id="summaryList"></ul>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-icon">✉️</span><span class="card-title">Draft Email</span></div>
      <p class="email-subject" id="emailSubject"></p>
      <p class="email-body"    id="emailBody"></p>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-icon">✅</span><span class="card-title">Tasks &amp; Action Items</span></div>
      <ul class="task-list" id="taskList"></ul>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-icon">🎤</span><span class="card-title">Transcript</span></div>
      <p class="transcript-text" id="transcriptText"></p>
    </div>
  </div>

  <button class="new-btn" id="newBtn" onclick="resetApp()">+ New Recording</button>

  <script>
    // ── The only URL in this file — no API keys anywhere ──
    const WORKER_URL = "https://ai-ring-proxy.vinodraman-079.workers.dev";

    let mediaRecorder  = null;
    let audioChunks    = [];
    let isRecording    = false;
    let timerInterval  = null;
    let secondsElapsed = 0;

    const el = id => document.getElementById(id);

    function setStatus(text, cls = "") {
      el("status").textContent = text;
      el("status").className   = "status " + cls;
    }

    function resetApp() {
      el("results").className   = "results";
      el("newBtn").className    = "new-btn";
      el("recordBtn").className = "record-btn idle";
      el("btnIcon").textContent  = "🎙️";
      el("btnLabel").textContent = "Tap to Record";
      setStatus("Ready");
    }

    async function toggleRecording() {
      isRecording ? stopRecording() : await startRecording();
    }

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks   = [];

        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = async () => {
          const blob = new Blob(audioChunks, { type: "audio/webm" });
          stream.getTracks().forEach(t => t.stop());
          await processRecording(blob);
        };

        mediaRecorder.start();
        isRecording    = true;
        secondsElapsed = 0;

        el("recordBtn").className  = "record-btn recording";
        el("btnIcon").textContent  = "⏹️";
        el("btnLabel").textContent = "Tap to Stop";
        el("timer").className      = "timer visible";
        el("results").className    = "results";
        el("newBtn").className     = "new-btn";
        setStatus("Recording…", "active");

        timerInterval = setInterval(() => {
          secondsElapsed++;
          const m = Math.floor(secondsElapsed / 60);
          const s = secondsElapsed % 60;
          el("timer").textContent = m + ":" + String(s).padStart(2, "0");
        }, 1000);

      } catch {
        setStatus("Microphone access denied — allow mic in Safari settings.");
      }
    }

    function stopRecording() {
      if (!mediaRecorder || !isRecording) return;
      mediaRecorder.stop();
      isRecording = false;
      clearInterval(timerInterval);

      el("recordBtn").className  = "record-btn idle";
      el("btnIcon").textContent  = "🎙️";
      el("btnLabel").textContent = "Tap to Record";
      el("timer").className      = "timer";
      setStatus("Recording saved — transcribing…", "saved");
    }

    async function processRecording(audioBlob) {
      try {
        // Step 1 — send audio to Worker → Deepgram
        setStatus("Transcribing…", "thinking");

        const dgRes  = await fetch(WORKER_URL + "/transcribe", {
          method:  "POST",
          headers: { "Content-Type": "audio/webm" },
          body:    audioBlob,
        });

        const dgData     = await dgRes.json();
        const transcript = dgData?.results?.channels?.[0]?.alternatives?.[0]?.transcript || "";

        if (!transcript.trim()) {
          setStatus("No speech detected — try again.");
          return;
        }

        el("transcriptText").textContent = transcript;

        // Step 2 — send transcript to Worker → Claude
        setStatus("Analysing with Claude…", "thinking");

        const aiRes  = await fetch(WORKER_URL + "/analyse", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ transcript }),
        });

        const aiData = await aiRes.json();
        const raw    = aiData?.content?.[0]?.text || "";
        const clean  = raw.replace(/```json|```/g, "").trim();
        const parsed = JSON.parse(clean);

        renderResults(parsed);

      } catch (err) {
        setStatus("Something went wrong — please try again.");
        console.error(err);
      }
    }

    function renderResults(data) {
      el("summaryList").innerHTML = (data.summary || []).map(b => `<li>${b}</li>`).join("");
      el("emailSubject").textContent = "Subject: " + (data.email?.subject || "");
      el("emailBody").textContent    = data.email?.body || "";
      el("taskList").innerHTML = (data.tasks || []).map(t => `<li>${t}</li>`).join("");

      el("results").className = "results visible";
      el("newBtn").className  = "new-btn visible";
      setStatus("Done ✓", "saved");
      el("results").scrollIntoView({ behavior: "smooth", block: "start" });
    }
  </script>

</body>
</html>
